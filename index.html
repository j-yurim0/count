<script>
    document.getElementById('excelFile').addEventListener('change', handleFile, false);

    function handleFile(e) {
        let files = e.target.files;
        if (files.length === 0) return;
        let f = files[0];
        let reader = new FileReader();

        reader.onload = function(e) {
            let data = new Uint8Array(e.target.result);
            let workbook = XLSX.read(data, {type: 'array'});
            let firstSheetName = workbook.SheetNames[0];
            let worksheet = workbook.Sheets[firstSheetName];
            let json_data = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            analyzeData(json_data);
        };
        reader.readAsArrayBuffer(f);
    }

    function analyzeData(rows) {
        let countC = 0;
        let countPipe = 0;
        let currentSection = "각관"; // 기본값 (맨 처음 제목이 없을 경우 각관으로 시작)

        for (let i = 0; i < rows.length; i++) {
            let row = rows[i];
            if (!row || row.length === 0) continue;

            // 핵심 수정 포인트: 해당 줄의 모든 칸 데이터를 빈칸 없이 하나로 합칩니다.
            // (예: POST-1, HOLE, 100 -> POST-1HOLE100)
            let rowText = row.map(cell => cell ? String(cell).replace(/\s/g, "") : "").join("");

            if (rowText === "") continue; // 완전히 빈 줄은 통과

            // 구역 변경 인식
            if (rowText.includes("C형강")) {
                currentSection = "C형강";
                continue;
            } else if (rowText.includes("각관")) {
                currentSection = "각관";
                continue;
            }

            // 수량에서 제외해야 할 '제목/소계' 줄 걸러내기
            if (rowText.includes("제품명") || 
                rowText.includes("규격") || 
                rowText.includes("소계") || 
                rowText.includes("타공여부") || 
                rowText.includes("페이지") || 
                rowText.includes("단중")) {
                continue;
            }

            // 위의 조건들을 다 통과했고, 글자 길이가 10자 이상이면 '실제 자재 도면 데이터'로 취급하여 카운트!
            if (rowText.length > 10) {
                if (currentSection === "C형강") {
                    countC++;
                } else if (currentSection === "각관") {
                    countPipe++;
                }
            }
        }

        // 결과 화면에 표시
        document.getElementById('cCount').innerText = countC;
        document.getElementById('pipeCount').innerText = countPipe;
        document.getElementById('resultArea').style.display = "block";
    }

    function saveData() {
        let pipeCount = document.getElementById('pipeCount').innerText;
        let pipeAssignee = document.getElementById('pipeAssignee').value;
        let cCount = document.getElementById('cCount').innerText;
        let cAssignee = document.getElementById('cAssignee').value;

        if(!pipeAssignee || !cAssignee) {
            alert("각관과 C형강의 담당자를 모두 선택해주세요!");
            return;
        }

        alert(`저장 준비 완료!\n각관: ${pipeCount}장 (${pipeAssignee})\nC형강: ${cCount}장 (${cAssignee})`);
    }
</script>
